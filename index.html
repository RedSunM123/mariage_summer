<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Mariage</title>
    <style>
        body { 
            text-align: center; 
            margin: 0;
            padding: 20px;
            background-color: #f4f4f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            /* Empêche les gestes de glissement par défaut sur mobile pour éviter les bugs */
            touch-action: none; 
        }

        .invitation-container {
            position: relative;
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
            line-height: 0; 
        }

        .canva-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- ZONE DES BOUTONS PAR-DESSUS L'IMAGE --- */
        .button-area { 
            position: absolute;
            bottom: 5px; 
            left: 0;
            width: 100%;
            height: 110px; 
            line-height: normal;
        }

        button { 
            padding: 8px 22px; 
            font-size: 12px; 
            cursor: pointer; 
            border-radius: 20px; 
            border: none;
            font-weight: bold;
            letter-spacing: 1px;
            position: absolute;
        }

        #oui { 
            background-color: #1e3a8a; 
            color: white; 
            left: 50%;
            transform: translateX(-50%); 
            top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
            transition: transform 0.1s ease;
        }

        #oui:hover {
            background-color: #172554;
            transform: translateX(-50%) scale(1.05); 
        }

        #non { 
            background-color: #ffffff; 
            color: #64748b; 
            left: 50%;
            transform: translateX(-50%);
            top: 50px; 
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            
            /* --- OPTIMISATION TACTILE MOBILE --- */
            /* Ajoute une zone invisible de 20px tout autour pour détecter le doigt de loin */
            border: 20px solid transparent; 
            background-clip: padding-box; 
            /* Annule l'effet de zoom ou double-tap natif des téléphones */
            touch-action: manipulation; 
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <!-- REMPLACEZ LE TEXTE DANS SRC PAR VOTRE LIEN D'IMAGE DIRECT -->
        <img class="canva-img" src="https://i.postimg.cc/44M0trSs/Invitation-Soiree-Anniversaire-Moderne-Elegant-Rose-et-Vert.png" alt="Invitation">
        
        <div class="button-area">
            <button id="oui" onclick="confirmer()">OUI !</button>
            <!-- Événements tactiles (touchstart/touchend) intégrés pour une fuite immédiate au doigt -->
            <button id="non" onmouseover="fuite()" ontouchstart="fuite(event)" ontouchend="event.preventDefault()" onclick="fuite(event)">NON</button>
        </div>
    </div>

    <script>
        function fuite(e) {
            // Empêche le comportement par défaut du téléphone (comme cliquer par erreur pendant la fuite)
            if(e) {
                e.preventDefault();
            }

            var btnNon = document.getElementById('non');
            var zone = document.querySelector('.button-area');
            
            // Prend en compte la zone invisible agrandie pour ne pas déborder de l'écran
            var maxW = zone.clientWidth - btnNon.offsetWidth;
            var maxH = zone.clientHeight - btnNon.offsetHeight;
            
            var randomX = Math.floor(Math.random() * maxW);
            var randomY = Math.floor(Math.random() * maxH);
            
            btnNon.style.transform = 'none'; 
            btnNon.style.left = randomX + 'px';
            btnNon.style.top = randomY + 'px';
        }

        function confirmer() {
            alert('Évidemment ! Le plus bel été de notre vie commence avec vous. 🌊✨');
        }
    </script>
</body>
</html>
