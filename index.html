<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitation EVJF</title>
    <style>
        body { 
            text-align: center; 
            margin: 0;
            padding: 20px;
            background-color: #f4f4f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            touch-action: none; /* Bloque le scroll natif pour laisser le script agir */
        }

        .invitation-container {
            position: relative;
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
            line-height: 0; 
            background-color: #ffffff; 
            padding: 30px 20px 130px 20px; 
            box-sizing: border-box;
        }

        .canva-img {
            width: 100%; 
            height: auto;
            display: block;
            border-radius: 6px; 
        }

        /* --- ZONE DES BOUTONS --- */
        .button-area { 
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 120px; 
            line-height: normal;
            background-color: #ffffff; 
        }

        button { 
            width: 90px;
            height: 35px;
            padding: 0; 
            font-size: 12px; 
            cursor: pointer; 
            border-radius: 20px; 
            border: none;
            font-weight: bold;
            letter-spacing: 1px;
            position: absolute;
            box-sizing: border-box;
        }

        #oui { 
            background-color: #1e3a8a; 
            color: white; 
            left: 50%;
            transform: translateX(-50%); 
            top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
            transition: transform 0.1s ease;
        }

        #oui:hover {
            background-color: #172554;
            transform: translateX(-50%) scale(1.05); 
        }

        #non { 
            background-color: #ffffff; 
            color: #64748b; 
            left: 50%;
            transform: translateX(-50%);
            top: 60px; 
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            touch-action: none; /* Force le téléphone à ignorer le comportement tactile par défaut */
        }

        /* Zone tactile invisible pour le bouton NON */
        #non::before {
            content: '';
            position: absolute;
            top: -25px;
            left: -25px;
            right: -25px;
            bottom: -25px;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <!-- N'oubliez pas de remettre votre lien d'image ici -->
        <img class="canva-img" src="https://i.postimg.cc/44M0trSs/Invitation-Soiree-Anniversaire-Moderne-Elegant-Rose-et-Vert.png" alt="Invitation">
        
        <div class="button-area">
            <button id="oui" onclick="confirmer()">OUI !</button>
            <button id="non">NON</button>
        </div>
    </div>

    <script>
        const btnNon = document.getElementById('non');
        const zone = document.querySelector('.button-area');

        // Fonction unique pour déplacer le bouton de manière fluide et aléatoire
        function fuite(e) {
            if(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            // Calcul des coordonnées maximales autorisées
            const maxW = zone.clientWidth - btnNon.offsetWidth;
            const maxH = zone.clientHeight - btnNon.offsetHeight;
            
            // Génère une position aléatoire sécurisée
            let randomX = Math.floor(Math.random() * maxW);
            let randomY = Math.floor(Math.random() * maxH);
            
            // Évite que le bouton se colle trop près du haut ou du bouton OUI au premier mouvement
            if (randomY < 15) randomY = 20;

            btnNon.style.transform = 'none'; 
            btnNon.style.left = randomX + 'px';
            btnNon.style.top = randomY + 'px';
        }

        // Écouteurs d'événements robustes pour ordinateur ET mobile
        btnNon.addEventListener('mouseover', fuite);
        btnNon.addEventListener('touchstart', fuite, { passive: false });
        btnNon.addEventListener('click', fuite);

        function confirmer() {
            alert('Évidemment ! Hâte de t'y retrouver !✨');
        }
    </script>
</body>
</html>
