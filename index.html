<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation EVJF</title>
    <style>
        body { 
            text-align: center; 
            margin: 0;
            padding: 20px;
            background-color: #f4f4f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .invitation-container {
            position: relative;
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
            line-height: 0; 
            background-color: #ffffff; 
            padding: 30px 20px 130px 20px; 
            box-sizing: border-box;
        }

        .canva-img {
            width: 100%; 
            height: auto;
            display: block;
            border-radius: 6px; 
        }

        /* --- ZONE DES BOUTONS --- */
        .button-area { 
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 120px; 
            line-height: normal;
            background-color: #ffffff; 
        }

        button { 
            width: 90px;
            height: 35px;
            padding: 0; 
            font-size: 12px; 
            cursor: pointer; 
            border-radius: 20px; 
            border: none;
            font-weight: bold;
            letter-spacing: 1px;
            position: absolute;
            box-sizing: border-box;
        }

        #oui { 
            background-color: #1e3a8a; 
            color: white; 
            left: 50%;
            transform: translateX(-50%); 
            top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #non { 
            background-color: #ffffff; 
            color: #64748b; 
            left: 50%;
            transform: translateX(-50%);
            top: 60px; 
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <!-- REMPLACEZ LE TEXTE DANS SRC PAR VOTRE LIEN D'IMAGE DIRECT -->
        <img class="canva-img" src="https://i.postimg.cc/44M0trSs/Invitation-Soiree-Anniversaire-Moderne-Elegant-Rose-et-Vert.png" alt="Invitation">
        
        <div class="button-area">
            <button id="oui" onclick="confirmer()">OUI !</button>
            <button id="non" onmouseover="fuite()" ontouchstart="fuite()">NON</button>
        </div>
    </div>

    <script>
        function fuite() {
            var btnNon = document.getElementById('non');
            var zone = document.querySelector('.button-area');
            
            var maxW = zone.clientWidth - btnNon.offsetWidth;
            var maxH = zone.clientHeight - btnNon.offsetHeight;
            
            var randomX = Math.floor(Math.random() * maxW);
            var randomY = Math.floor(Math.random() * maxH);
            
            if (randomY < 15) randomY = 25;

            btnNon.style.transform = 'none'; 
            btnNon.style.left = randomX + 'px';
            btnNon.style.top = randomY + 'px';
        }

        function confirmer() {
            alert('Évidemment ! Hâte de t\'y retrouver !✨');
        }
    </script>
</body>
</html>
