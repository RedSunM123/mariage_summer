<!<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Mariage</title>
    <style>
        body { 
            text-align: center; 
            margin: 0;
            padding: 20px;
            background-color: #f4f4f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .invitation-container {
            position: relative;
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
            line-height: 0; 
        }

        .canva-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- ZONE DES BOUTONS PAR-DESSUS L'IMAGE --- */
        .button-area { 
            position: absolute;
            bottom: 5px; 
            left: 0;
            width: 100%;
            height: 120px; 
            line-height: normal;
        }

        button { 
            padding: 12px 35px; 
            font-size: 15px; 
            cursor: pointer; 
            border-radius: 25px; 
            border: none;
            font-weight: bold;
            letter-spacing: 1px;
            position: absolute;
            transition: transform 0.1s ease;
        }

        #oui { 
            background-color: #1e3a8a; /* Bleu marine élégant */
            color: white; 
            left: 50%;
            transform: translateX(-50%); 
            top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #oui:hover {
            background-color: #172554; /* Bleu plus foncé au survol */
            transform: translateX(-50%) scale(1.05); 
        }

        #non { 
            background-color: #ffffff; 
            color: #64748b; 
            left: 50%;
            transform: translateX(-50%);
            top: 65px; 
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <!-- REMPLACEZ LE TEXTE DANS SRC PAR VOTRE LIEN D'IMAGE DIRECT (FINISSANT PAR .PNG OU .JPG) -->
        <img class="canva-img" src="https://i.postimg.cc/44M0trSs/Invitation-Soiree-Anniversaire-Moderne-Elegant-Rose-et-Vert.png" alt="Invitation">
        
        <div class="button-area">
            <button id="oui" onclick="confirmer()">OUI !</button>
            <button id="non" onmouseover="fuite()" onclick="fuite()">NON</button>
        </div>
    </div>

    <script>
        function fuite() {
            var btnNon = document.getElementById('non');
            var zone = document.querySelector('.button-area');
            
            var maxW = zone.clientWidth - btnNon.clientWidth;
            var maxH = zone.clientHeight - btnNon.clientHeight;
            
            var randomX = Math.floor(Math.random() * maxW);
            var randomY = Math.floor(Math.random() * maxH);
            
            btnNon.style.transform = 'none'; 
            btnNon.style.left = randomX + 'px';
            btnNon.style.top = randomY + 'px';
        }

        function confirmer() {
            alert('Évidemment ! Hâte de t’y retrouver !✨');
        }
    </script>
</body>
</html>
